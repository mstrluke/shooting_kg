services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: shooting_kg
      POSTGRES_USER: shooting
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  server:
    build: ./server
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://shooting:${DB_PASSWORD}@db:5432/shooting_kg
      JWT_SECRET: ${JWT_SECRET}
      PORT: "4000"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    networks:
      - internal

  client:
    build: ./client
    restart: always
    depends_on:
      - server
    networks:
      - internal
      - web

  nginx-proxy:
    image: nginx:alpine
    restart: always
    depends_on:
      - client
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    networks:
      - web

  certbot:
    image: certbot/certbot
    depends_on:
      - nginx-proxy
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${SSL_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN}

volumes:
  pgdata:
  uploads:
  certbot-etc:
  certbot-var:
  webroot:

networks:
  internal:
  web:
