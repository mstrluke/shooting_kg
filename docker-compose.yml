services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: shooting_kg
      POSTGRES_USER: shooting
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shooting_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build: ./server
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://shooting:${DB_PASSWORD:-shooting_pass}@db:5432/shooting_kg
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      PORT: "4000"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "4000:4000"

  client:
    build: ./client
    restart: always
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads:
